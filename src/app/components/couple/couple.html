<div class="couple-page">
  <div class="connection-card">
    
    <div class="relationship-display">
      
      <div class="user-profile">
        @if (myData()) {
          <div class="avatar-ring my-ring">
            <img [src]="myData().profile_image || 'https://www.w3schools.com/howto/img_avatar.png'" alt="Yo">
          </div>
          <p class="user-name">{{ myData().username }}</p>
          <span class="user-label">(Tú)</span>
        }
      </div>

      <div class="connection-center">
        <div class="pulse-heart">❤️</div>
      </div>

      <div class="user-profile">
        @if (partnerData()) {
          <div class="avatar-ring couple-ring">
            <img [src]="partnerData().profile_image || 'https://www.w3schools.com/howto/img_avatar.png'" alt="Pareja">
          </div>
          <p class="user-name">{{ partnerData().username }}</p>
          <span class="user-label">(Tu Pareja)</span>
        } @else {
          <div class="avatar-ring placeholder">
            <span>?</span>
          </div>
          <p class="user-name">Esperando...</p>
        }
      </div>

    </div>

    <div class="connection-footer" *ngIf="partnerData()">
       <p class="status">✨ ¡Listos para el próximo plan! ✨</p>
    </div>

  </div>
</div>
