<nav class="navbar">
  <div class="nav-container">
    <a routerLink="/dashboard" class="nav-logo" (click)="closeMenu()">
      <span>💑</span> Planes
    </a>

    <button class="menu-toggle" (click)="toggleMenu()" [class.open]="menuOpen()">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <div class="nav-links" [class.active]="menuOpen()">
      @if (isLogged()) {
        <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMenu()">Inicio</a>
        <a routerLink="/completed" routerLinkActive="active" (click)="closeMenu()">Recuerdos</a>
        <a routerLink="/couple" routerLinkActive="active" (click)="closeMenu()">Mi Pareja</a>
        
        <div class="user-info">
          <span class="user-name">Hola, <strong>{{ username() }}</strong></span>
          <button class="btn-logout" (click)="logout()">Salir</button>
        </div>
      } @else {
        <a routerLink="/login" routerLinkActive="active" (click)="closeMenu()">Entrar</a>
        <a routerLink="/register" class="btn-register" (click)="closeMenu()">Empezar</a>
      }
    </div>
  </div>
</nav>
